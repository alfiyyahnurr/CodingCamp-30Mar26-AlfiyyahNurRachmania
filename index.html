<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense & Budget Visualizer</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="background-gradient"></div>
    
    <div class="container">
        <header>
            <div class="header-content">
                <div class="logo">
                    <span class="logo-icon">💰</span>
                    <h1>SpendWise</h1>
                </div>
                <button id="themeToggle" class="theme-toggle">
                    <span class="toggle-icon">🌙</span>
                </button>
            </div>
        </header>

        <div class="dashboard-grid">
            <div class="balance-section">
                <div class="balance-card glass-effect">
                    <div class="balance-icon">💵</div>
                    <p class="balance-label">Total Spending</p>
                    <h2 class="balance-amount" id="totalBalance">$0.00</h2>
                    <div class="balance-bar">
                        <div class="balance-progress" id="balanceProgress"></div>
                    </div>
                    <p class="balance-limit">Limit: $1,000.00</p>
                </div>
            </div>

            <div class="form-section">
                <div class="form-card glass-effect">
                    <div class="form-header">
                        <span class="form-icon">➕</span>
                        <h3>New Expense</h3>
                    </div>
                    <form id="transactionForm">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="itemName">
                                    <span class="label-icon">📝</span>
                                    Item Name
                                </label>
                                <input type="text" id="itemName" placeholder="e.g., Coffee, Taxi, Movie" required>
                            </div>
                        </div>
                        <div class="form-row-split">
                            <div class="form-group">
                                <label for="amount">
                                    <span class="label-icon">💲</span>
                                    Amount
                                </label>
                                <input type="number" id="amount" step="0.01" placeholder="0.00" required>
                            </div>
                            <div class="form-group">
                                <label for="category">
                                    <span class="label-icon">🏷️</span>
                                    Category
                                </label>
                                <select id="category" required>
                                    <option value="">Choose...</option>
                                    <option value="Food">🍔 Food</option>
                                    <option value="Transport">🚗 Transport</option>
                                    <option value="Fun">🎉 Fun</option>
                                </select>
                            </div>
                        </div>
                        <button type="submit" class="btn-primary">
                            <span>Add Expense</span>
                            <span class="btn-arrow">→</span>
                        </button>
                    </form>
                </div>
            </div>

            <div class="chart-section">
                <div class="chart-card glass-effect">
                    <div class="chart-header">
                        <span class="chart-icon">📊</span>
                        <h3>Spending Overview</h3>
                    </div>
                    <div class="chart-container">
                        <canvas id="spendingChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="transactions-section">
                <div class="transactions-card glass-effect">
                    <div class="transactions-header">
                        <div class="header-left">
                            <span class="transactions-icon">📋</span>
                            <h3>Recent Activity</h3>
                        </div>
                        <select id="sortBy" class="sort-select">
                            <option value="date">📅 Latest</option>
                            <option value="amount-high">💰 Highest</option>
                            <option value="amount-low">💵 Lowest</option>
                            <option value="category">🏷️ Category</option>
                        </select>
                    </div>
                    <div class="transactions-list" id="transactionsList">
                        <div class="empty-state">
                            <div class="empty-icon">📭</div>
                            <p>No expenses yet</p>
                            <span>Start tracking your spending!</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
