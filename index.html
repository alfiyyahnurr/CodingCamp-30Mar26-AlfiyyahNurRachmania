<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense & Budget Visualizer</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Expense & Budget Visualizer</h1>
            <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">
                <span class="toggle-icon"></span>
            </button>
        </header>

        <div class="balance-card">
            <p class="balance-label">TOTAL BALANCE</p>
            <h2 class="balance-amount" id="totalBalance">$0.00</h2>
            <div class="balance-info">
                <span>Limit: <span id="spendingLimit">$1,000.00</span></span>
                <button id="editLimitBtn" class="btn-link">Edit</button>
            </div>
            <div class="balance-bar">
                <div class="balance-progress" id="balanceProgress"></div>
            </div>
        </div>

        <div class="main-content">
            <div class="left-section">
                <div class="card">
                    <h3>Add Transaction</h3>
                    <form id="transactionForm">
                        <div class="form-group">
                            <label for="itemName">Item Name</label>
                            <input type="text" id="itemName" placeholder="Enter item name" required>
                        </div>
                        <div class="form-group">
                            <label for="amount">Amount</label>
                            <input type="number" id="amount" step="0.01" placeholder="0.00" required>
                        </div>
                        <div class="form-group">
                            <label for="category">Category</label>
                            <select id="category" required>
                                <option value="">Select category</option>
                                <option value="Food">Food</option>
                                <option value="Transport">Transport</option>
                                <option value="Fun">Fun</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="date">Date</label>
                            <input type="date" id="date" required>
                        </div>
                        <button type="submit" class="btn-primary">Add Transaction</button>
                    </form>
                    <button id="manageCategoriesBtn" class="btn-secondary">Manage Categories</button>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h3>Transactions</h3>
                        <select id="sortBy" class="sort-select">
                            <option value="date">Latest</option>
                            <option value="amount-high">Highest Amount</option>
                            <option value="amount-low">Lowest Amount</option>
                            <option value="category">Category</option>
                        </select>
                    </div>
                    <div class="transactions-list" id="transactionsList">
                        <div class="empty-state">
                            <p>No transactions yet</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="right-section">
                <div class="card">
                    <div class="card-header">
                        <h3>Spending by Category</h3>
                        <button id="viewSummaryBtn" class="btn-link">Monthly Summary</button>
                    </div>
                    <div class="chart-container">
                        <canvas id="spendingChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal for Category Management -->
    <div id="categoryModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Manage Categories</h3>
                <button class="modal-close" id="closeCategoryModal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="category-list" id="categoryList"></div>
                <div class="add-category-form">
                    <input type="text" id="newCategoryName" placeholder="New category name" />
                    <button id="addCategoryBtn" class="btn-primary">Add</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal for Monthly Summary -->
    <div id="summaryModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Monthly Summary</h3>
                <button class="modal-close" id="closeSummaryModal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="summary-controls">
                    <select id="summaryMonth" class="summary-select"></select>
                    <select id="summaryYear" class="summary-select"></select>
                </div>
                <div id="summaryContent" class="summary-content"></div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
